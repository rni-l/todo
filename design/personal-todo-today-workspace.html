
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人 TODO · 今日工作台</title>
  <style>
    :root {
      --bg: oklch(97% 0.012 230);
      --surface: oklch(99% 0.004 230);
      --fg: oklch(20% 0.018 240);
      --muted: oklch(52% 0.018 240);
      --border: oklch(88% 0.012 235);
      --accent: oklch(57% 0.13 205);

      --accent-soft: color-mix(in oklch, var(--accent) 13%, transparent);
      --accent-quiet: color-mix(in oklch, var(--accent) 8%, var(--surface));
      --fg-soft: color-mix(in oklch, var(--fg) 6%, transparent);
      --warn: oklch(64% 0.14 58);
      --danger: oklch(56% 0.14 25);
      --success: oklch(58% 0.12 155);
      --glass: color-mix(in oklch, var(--surface) 76%, transparent);

      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;

      --radius: 12px;
      --radius-lg: 20px;
      --sidebar: 248px;
      --drawer: clamp(400px, 31vw, 500px);
      --shadow: 0 24px 80px color-mix(in oklch, var(--fg) 10%, transparent);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, color-mix(in oklch, var(--accent) 8%, transparent), transparent 36rem),
        linear-gradient(180deg, var(--bg), color-mix(in oklch, var(--bg) 86%, var(--surface)));
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.45;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3 {
      margin: 0;
      font-family: var(--font-display);
      color: var(--fg);
      text-wrap: balance;
      letter-spacing: 0;
    }
    p { margin: 0; text-wrap: pretty; }
    svg { display: block; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr) var(--drawer);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 14px;
      background: var(--glass);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 8px 10px;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: var(--fg);
      color: var(--surface);
      box-shadow: inset 0 1px 0 color-mix(in oklch, var(--surface) 22%, transparent);
    }
    .brand-copy strong {
      display: block;
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: 0;
    }
    .brand-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .primary-add {
      min-height: 42px;
      border: 0;
      border-radius: 14px;
      background: var(--accent);
      color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 650;
      box-shadow: 0 10px 24px color-mix(in oklch, var(--accent) 22%, transparent);
    }
    .primary-add:active { transform: translateY(1px); }

    .nav-block { display: grid; gap: 3px; }
    .nav-heading {
      margin: 10px 9px 6px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .nav-item {
      min-height: 38px;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 9px;
      padding: 0 10px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      text-align: left;
    }
    .nav-item:hover { background: var(--fg-soft); color: var(--fg); }
    .nav-item.active {
      background: var(--accent-soft);
      color: var(--fg);
    }
    .nav-count {
      min-width: 23px;
      height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .project-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      justify-self: center;
    }
    .project-dot.green { background: var(--success); }
    .project-dot.warn { background: var(--warn); }

    .sidebar-bottom {
      margin-top: auto;
      display: grid;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .main-pane {
      min-width: 0;
      padding: 28px clamp(20px, 4vw, 48px) 48px;
    }

    .mobile-topbar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 16px;
      background: color-mix(in oklch, var(--bg) 88%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      align-items: center;
      justify-content: space-between;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--fg);
      display: grid;
      place-items: center;
    }
    .icon-btn:hover { background: var(--fg-soft); }
    .icon-btn.plain {
      border: 0;
      background: transparent;
    }

    .page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      margin-bottom: 22px;
    }
    .eyebrow {
      margin-bottom: 8px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .07em;
      text-transform: uppercase;
    }
    .page-title {
      font-size: clamp(38px, 5vw, 62px);
      line-height: 1.02;
    }
    .page-subtitle {
      margin-top: 10px;
      color: var(--muted);
      max-width: 62ch;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .segmented, .soft-button, .quiet-button {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--fg);
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .quiet-button {
      background: transparent;
      color: var(--muted);
    }
    .segmented {
      padding: 4px;
      gap: 2px;
    }
    .segmented button {
      border: 0;
      border-radius: 9px;
      background: transparent;
      padding: 6px 10px;
      color: var(--muted);
    }
    .segmented button.active {
      background: var(--fg);
      color: var(--surface);
    }

    .quick-add {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in oklch, var(--surface) 82%, transparent);
      box-shadow: 0 1px 0 color-mix(in oklch, var(--surface) 80%, transparent) inset;
      backdrop-filter: blur(16px);
      margin-bottom: 22px;
    }
    .quick-add input {
      min-width: 0;
      height: 42px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--fg);
      padding: 0 8px;
      font-size: 16px;
    }
    .quick-add input::placeholder { color: color-mix(in oklch, var(--muted) 70%, transparent); }

    .chip {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      padding: 0 10px;
      font-size: 13px;
    }
    .chip.strong {
      color: var(--fg);
      background: var(--accent-quiet);
      border-color: color-mix(in oklch, var(--accent) 26%, var(--border));
    }
    .chip.warn { color: var(--warn); }
    .chip.danger { color: var(--danger); }

    .task-board {
      display: grid;
      gap: 18px;
    }

    .group {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: color-mix(in oklch, var(--surface) 78%, transparent);
      overflow: hidden;
      box-shadow: 0 1px 0 color-mix(in oklch, var(--surface) 85%, transparent) inset;
    }
    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklch, var(--surface) 72%, transparent);
    }
    .group-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
    }
    .group-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .group-title .dot.danger { background: var(--danger); }
    .group-title .dot.muted { background: var(--border); }
    .group-meta {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .task-list { display: grid; }
    .task-row {
      min-height: 54px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      padding: 9px 14px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      text-align: left;
      width: 100%;
    }
    .task-row:last-child { border-bottom: 0; }
    .task-row:hover { background: var(--fg-soft); }
    .task-row.selected {
      background: color-mix(in oklch, var(--accent) 10%, transparent);
    }
    .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: grid;
      place-items: center;
      background: var(--surface);
      color: var(--surface);
    }
    .task-row.done .check {
      background: var(--success);
      border-color: var(--success);
    }
    .task-row.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }
    .task-title {
      display: block;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-meta {
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }
    .mini-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--fg-soft);
      color: var(--muted);
    }
    .priority {
      width: 8px;
      height: 22px;
      border-radius: 999px;
      background: var(--border);
    }
    .priority.high { background: var(--danger); }
    .priority.mid { background: var(--warn); }
    .priority.low { background: var(--success); }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tiny-action {
      height: 30px;
      min-width: 30px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--muted);
      display: inline-grid;
      place-items: center;
      padding: 0 8px;
      font-size: 12px;
    }
    .tiny-action:hover { color: var(--fg); background: var(--surface); }

    .drawer {
      position: sticky;
      top: 0;
      height: 100vh;
      min-width: 0;
      border-left: 1px solid var(--border);
      background: color-mix(in oklch, var(--surface) 88%, transparent);
      backdrop-filter: blur(20px);
      display: grid;
      grid-template-rows: auto 1fr;
      box-shadow: -18px 0 54px color-mix(in oklch, var(--fg) 5%, transparent);
    }
    .drawer-toolbar {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .save-state {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .drawer-content {
      min-height: 0;
      overflow: auto;
      padding: 22px;
      display: grid;
      gap: 18px;
    }
    .drawer-title {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--fg);
      font-family: var(--font-display);
      font-size: 31px;
      line-height: 1.16;
      resize: none;
      min-height: 78px;
    }
    .property-grid {
      display: grid;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 8px;
    }
    .property {
      min-height: 42px;
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      border-radius: 11px;
    }
    .property:hover { background: var(--fg-soft); }
    .property-label {
      color: var(--muted);
      font-size: 13px;
    }
    .property-value {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      font-weight: 600;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .panel-title {
      font-weight: 750;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .note-area {
      min-height: 118px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in oklch, var(--bg) 54%, var(--surface));
      color: var(--fg);
      padding: 12px;
      outline: 0;
      resize: vertical;
    }
    .subtask {
      min-height: 36px;
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: 9px;
      color: var(--fg);
    }
    .file-row {
      min-height: 42px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in oklch, var(--bg) 45%, var(--surface));
    }
    .file-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .mobile-bottom {
      display: none;
      position: fixed;
      z-index: 20;
      left: 12px;
      right: 12px;
      bottom: 12px;
      min-height: 64px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: color-mix(in oklch, var(--surface) 88%, transparent);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      grid-template-columns: repeat(5, 1fr);
      padding: 6px;
    }
    .mobile-bottom button {
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      gap: 2px;
      font-size: 11px;
      min-height: 52px;
    }
    .mobile-bottom button.active {
      background: var(--accent-soft);
      color: var(--fg);
    }

    .fab {
      display: none;
      position: fixed;
      right: 20px;
      bottom: 90px;
      z-index: 22;
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 20px;
      background: var(--accent);
      color: var(--surface);
      box-shadow: 0 16px 36px color-mix(in oklch, var(--accent) 28%, transparent);
      place-items: center;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: color-mix(in oklch, var(--fg) 18%, transparent);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }
    .modal-layer.open { display: flex; }
    .dialog {
      width: min(560px, 100%);
      max-height: min(720px, 92vh);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .dialog-head {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .dialog-body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .field {
      display: grid;
      gap: 7px;
    }
    .field label {
      color: var(--muted);
      font-size: 13px;
    }
    .input, .textarea, .select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in oklch, var(--bg) 35%, var(--surface));
      color: var(--fg);
      padding: 0 12px;
      outline: 0;
    }
    .textarea {
      min-height: 100px;
      padding: 12px;
      resize: vertical;
    }
    .input:focus, .textarea:focus, .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .cmd-list { display: grid; gap: 6px; }
    .cmd-item {
      min-height: 46px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 13px;
      border: 0;
      background: transparent;
      text-align: left;
      color: var(--fg);
    }
    .cmd-item:hover, .cmd-item.active { background: var(--accent-soft); }
    .shortcut {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 2px 6px;
      background: var(--surface);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 90;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--fg);
      color: var(--surface);
      box-shadow: var(--shadow);
      transition: opacity .2s ease, transform .2s ease;
      font-size: 14px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1180px) {
      .app-shell { grid-template-columns: var(--sidebar) minmax(0, 1fr); }
      .drawer {
        position: fixed;
        z-index: 50;
        right: 0;
        top: 0;
        width: min(var(--drawer), 92vw);
        transform: translateX(105%);
        transition: transform .22s ease;
      }
      .drawer.open { transform: translateX(0); }
      .drawer::before {
        content: "";
        position: fixed;
        inset: 0 100% 0 auto;
      }
    }

    @media (max-width: 760px) {
      body { background: var(--bg); }
      .app-shell { display: block; }
      .sidebar { display: none; }
      .mobile-topbar { display: flex; }
      .main-pane {
        padding: 18px 14px 110px;
      }
      .page-header {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 14px;
        margin-bottom: 16px;
      }
      .page-title { font-size: 38px; }
      .header-actions {
        width: 100%;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 2px;
      }
      .quick-add {
        grid-template-columns: 1fr;
        padding: 10px;
        border-radius: 16px;
      }
      .quick-add .chip, .quick-add .soft-button { display: none; }
      .task-row {
        min-height: 64px;
        grid-template-columns: 30px minmax(0, 1fr);
        padding: 10px 12px;
      }
      .task-actions { display: none; }
      .drawer {
        width: 100vw;
        max-width: none;
      }
      .drawer-title { font-size: 28px; }
      .property { grid-template-columns: 82px 1fr; }
      .mobile-bottom { display: grid; }
      .fab { display: grid; }
      .toast { bottom: 92px; width: calc(100% - 32px); justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-topbar">
    <div class="brand-row" style="padding: 0;">

      toast.classList.add('show');
      clearTimeout(window.todoToastTimer);
      window.todoToastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function openDrawer(taskId) {
      document.querySelectorAll('.task-row').forEach(row => row.classList.remove('selected'));
      const row = document.querySelector(`[data-task="${taskId}"]`);
      if (row) row.classList.add('selected');
      titleInput.value = taskTitles[taskId] || '新任务';
      drawer.classList.add('open');
      showToast('已打开任务详情');
    }

    function closeDrawer() {
      drawer.classList.remove('open');
    }

    function openModal(layer) {
      layer.classList.add('open');
      layer.setAttribute('aria-hidden', 'false');
      const input = layer.querySelector('input, textarea');
      if (input) setTimeout(() => input.focus(), 80);
    }

    function closeModal(layer) {
      layer.classList.remove('open');
      layer.setAttribute('aria-hidden', 'true');
    }

    document.querySelectorAll('[data-task]').forEach(row => {
      row.addEventListener('click', event => {
        if (event.target.closest('[data-toggle-done], [data-postpone], [data-date-chip], [data-priority-chip]')) return;
        openDrawer(row.dataset.task);
      });
    });

    document.querySelectorAll('[data-toggle-done]').forEach(check => {
      check.addEventListener('click', event => {
        event.stopPropagation();
        const row = check.closest('.task-row');
        row.classList.toggle('done');
        showToast(row.classList.contains('done') ? '任务已完成' : '任务已恢复');
      });
    });

    document.querySelectorAll('[data-postpone]').forEach(button => {
      button.addEventListener('click', event => {
        event.stopPropagation();
        showToast('已延期到明天');
      });
    });

    document.querySelectorAll('[data-date-chip]').forEach(button => {
      button.addEventListener('click', event => {
        event.stopPropagation();
        button.classList.toggle('strong');
        showToast('日期选择弹层状态已切换');
      });
    });

    document.querySelectorAll('[data-priority-chip]').forEach(button => {
      button.addEventListener('click', event => {
        event.stopPropagation();
        button.classList.toggle('strong');
        showToast('优先级已标记');
      });
    });

    document.querySelectorAll('[data-open-new]').forEach(button => {
      button.addEventListener('click', event => {
        event.stopPropagation();
        closeModal(commandModal);
        openModal(newModal);
      });
    });

    document.querySelectorAll('[data-open-command]').forEach(button => {
      button.addEventListener('click', () => openModal(commandModal));
    });

    document.querySelectorAll('[data-close-modal]').forEach(button => {
      button.addEventListener('click', () => closeModal(newModal));
    });

    document.querySelectorAll('[data-close-command]').forEach(button => {
      button.addEventListener('click', () => closeModal(commandModal));
    });

    document.querySelector('[data-close-drawer]').addEventListener('click', closeDrawer);

    document.querySelectorAll('.modal-layer').forEach(layer => {
      layer.addEventListener('click', event => {
        if (event.target === layer) closeModal(layer);
      });
    });

    quickForm.addEventListener('submit', event => {
      event.preventDefault();
      const input = quickForm.elements.quickTask;
      const value = input.value.trim();
      if (!value) {
        showToast('先输入任务标题');
        input.focus();
        return;
      }
      const id = `quick-${Date.now()}`;
      taskTitles[id] = value;
      const row = document.createElement('button');
      row.className = 'task-row';
      row.type = 'button';
      row.dataset.task = id;
      row.innerHTML = `
        <span class="check" data-toggle-done><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4L19 6"/></svg></span>
        <span>
          <span class="task-title"></span>
          <span class="task-meta"><span class="mini-tag">今天</span><span class="mini-tag">快速添加</span></span>
        </span>
        <span class="task-actions"><span class="priority"></span><span class="tiny-action">详情</span></span>
      `;
      row.querySelector('.task-title').textContent = value;
      todayList.prepend(row);
      row.addEventListener('click', () => openDrawer(id));
      row.querySelector('[data-toggle-done]').addEventListener('click', eventDone => {
        eventDone.stopPropagation();
        row.classList.toggle('done');
        showToast(row.classList.contains('done') ? '任务已完成' : '任务已恢复');
      });
      input.value = '';
      openDrawer(id);
      showToast('已添加到今天');
    });

    createForm.addEventListener('submit', event => {
      event.preventDefault();
      const value = createForm.elements.taskName.value.trim();
      if (!value) return;
      closeModal(newModal);
      quickForm.elements.quickTask.value = value;
      quickForm.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
      createForm.reset();
    });

    [titleInput, note].forEach(field => {
      field.addEventListener('input', () => {
        saveState.textContent = '保存中';
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(() => {
          saveState.textContent = '已保存 · 刚刚';
          showToast('修改已自动保存');
        }, 650);
      });
    });

    document.querySelectorAll('[data-property], [data-add-subtask], [data-upload], [data-more-action]').forEach(button => {
      button.addEventListener('click', () => showToast('该操作会打开对应弹层'));
    });

    document.querySelectorAll('[data-command-action]').forEach(button => {
      button.addEventListener('click', () => {
        closeModal(commandModal);
        showToast('已执行命令');
      });
    });

    document.addEventListener('keydown', event => {
      const metaK = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k';
      if (metaK) {
        event.preventDefault();
        openModal(commandModal);
      }
      if (event.key === 'Escape') {
        closeModal(newModal);
        closeModal(commandModal);
        closeDrawer();
      }
    });
  </script>
</body>
</html>
